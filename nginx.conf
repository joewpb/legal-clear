worker_processes 1;
pid /tmp/legal-clear-nginx.pid;
error_log /tmp/legal-clear-nginx-error.log;

events {
    worker_connections 64;
}

http {
    access_log /tmp/legal-clear-nginx-access.log;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    server {
        listen 100.103.42.109:8088;

        root /home/hermes/wiki;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /forms/ {
            alias /home/hermes/wiki/raw/forms/;
            autoindex on;
        }

        location /circuits/ {
            alias /home/hermes/wiki/raw/forms/circuits/;
            autoindex on;
        }

        location /dataset/ {
            alias /home/hermes/wiki/raw/articles/;
            autoindex on;
        }
    }
}
